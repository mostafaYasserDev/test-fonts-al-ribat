<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرِّبَـاط</title>
    
    <!-- Tajawal Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        /* Thmanyah Font Setup */
        @font-face {
            font-family: 'Thmanyah';
            src: url('./otf/thmanyahseriftext-Bold.otf') format('opentype');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'Thmanyah';
            src: url('./otf/thmanyahseriftext-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }

        /* CSS Reset & Basics */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030811; /* Deep dark blue */
            color: #ffffff;
            transition: font-family 0.4s ease;
        }

        /* Font Classes */
        body.font-tajawal {
            font-family: 'Tajawal', sans-serif;
        }
        body.font-thmanyah {
            font-family: 'Thmanyah', serif;
        }
        
        /* Canvas container */
        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Toggle Switch */
        .font-toggle {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 0.3rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            pointer-events: auto;
        }

        .font-toggle button {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            padding: 0.6rem 2rem;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: 700;
        }

        .font-toggle button:hover {
            color: rgba(255, 255, 255, 0.9);
        }

        .font-toggle button.active {
            background: rgba(212, 175, 55, 0.15);
            color: #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* Content Overlay */
        .content-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 100%;
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 4rem 6rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: floatUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
            pointer-events: auto;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .glass-panel:hover {
            transform: translateY(0px) scale(1.02);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #d4af37 0%, #f3e5ab 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
            animation: pulseGlow 4s infinite alternate;
            transition: font-size 0.4s ease, letter-spacing 0.4s ease;
        }

        /* Font Specific Adjustments for H1 */
        body.font-tajawal h1 {
            font-size: 6rem;
            letter-spacing: 2px;
        }
        body.font-thmanyah h1 {
            font-size: 7rem;
            letter-spacing: 0px;
            font-weight: 700;
        }

        p {
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            max-width: 600px;
            line-height: 1.6;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: font-size 0.4s ease;
        }

        /* Font Specific Adjustments for P */
        body.font-tajawal p {
            font-size: 1.8rem;
        }
        body.font-thmanyah p {
            font-size: 2rem;
        }

        /* Animations */
        @keyframes floatUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 30px rgba(212, 175, 55, 0.2); }
            100% { text-shadow: 0 0 50px rgba(212, 175, 55, 0.6); }
        }

        /* Subtle glowing orb behind text */
        .glow-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="font-tajawal">

    <div id="webgl-container"></div>
    <div class="glow-orb"></div>

    <!-- Toggle Switch -->
    <div class="font-toggle">
        <button id="btn-tajawal" class="active">خط تاجوال</button>
        <button id="btn-thmanyah">خط ثمانية</button>
    </div>

    <div class="content-wrapper">
        <div class="glass-panel">
            <h1>الرِّبَــــــــــاط</h1>
            <p>رفيقك اليومي للحفاظ على صلواتك وتنظيم وقتك</p>
        </div>
    </div>

    <script>
        // Toggle Logic
        const btnTajawal = document.getElementById('btn-tajawal');
        const btnThmanyah = document.getElementById('btn-thmanyah');
        const body = document.body;

        btnTajawal.addEventListener('click', () => {
            body.classList.remove('font-thmanyah');
            body.classList.add('font-tajawal');
            btnThmanyah.classList.remove('active');
            btnTajawal.classList.add('active');
        });

        btnThmanyah.addEventListener('click', () => {
            body.classList.remove('font-tajawal');
            body.classList.add('font-thmanyah');
            btnTajawal.classList.remove('active');
            btnThmanyah.classList.add('active');
        });

        // Three.js Scene Setup
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030811, 0.001);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Particle System Setup
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 3000;
        
        const posArray = new Float32Array(particlesCount * 3);
        const colorsArray = new Float32Array(particlesCount * 3);

        const color1 = new THREE.Color(0xd4af37); // Gold
        const color2 = new THREE.Color(0x10b981); // Emerald Green
        const color3 = new THREE.Color(0xffffff); // White

        for(let i = 0; i < particlesCount * 3; i+=3) {
            const radius = 60 + Math.random() * 40;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(Math.random() * 2 - 1);

            posArray[i] = radius * Math.sin(phi) * Math.cos(theta);
            posArray[i+1] = radius * Math.sin(phi) * Math.sin(theta);
            posArray[i+2] = radius * Math.cos(phi);

            const mix = Math.random();
            let finalColor;
            if (mix < 0.6) finalColor = color1;
            else if (mix < 0.9) finalColor = color2;
            else finalColor = color3;

            colorsArray[i] = finalColor.r;
            colorsArray[i+1] = finalColor.g;
            colorsArray[i+2] = finalColor.b;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.8,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // Interactive Abstract Geometric Shape (Icosahedron)
        const geoGeometry = new THREE.IcosahedronGeometry(15, 1);
        const geoMaterial = new THREE.MeshBasicMaterial({
            color: 0xd4af37,
            wireframe: true,
            transparent: true,
            opacity: 0.15
        });
        const geoMesh = new THREE.Mesh(geoGeometry, geoMaterial);
        scene.add(geoMesh);
        
        const geoGeometry2 = new THREE.IcosahedronGeometry(20, 2);
        const geoMaterial2 = new THREE.PointsMaterial({
            color: 0x10b981,
            size: 0.2,
            transparent: true,
            opacity: 0.5
        });
        const geoMesh2 = new THREE.Points(geoGeometry2, geoMaterial2);
        scene.add(geoMesh2);

        // Mouse interaction for parallax effect
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // Main Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            targetX = mouseX * 0.001;
            targetY = mouseY * 0.001;

            // Slow rotations
            particlesMesh.rotation.y += 0.001;
            particlesMesh.rotation.x += 0.0005;

            geoMesh.rotation.x = elapsedTime * 0.1;
            geoMesh.rotation.y = elapsedTime * 0.15;
            
            geoMesh2.rotation.x = elapsedTime * -0.05;
            geoMesh2.rotation.y = elapsedTime * -0.08;

            // Apply parallax smoothly
            camera.position.x += (mouseX * 0.01 - camera.position.x) * 0.05;
            camera.position.y += (-mouseY * 0.01 - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        animate();

        // Handle browser resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
